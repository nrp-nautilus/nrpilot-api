apiVersion: apps/v1
kind: Deployment
metadata:
  name: nrpilot-api
  labels:
    app: nrpilot-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nrpilot-api
  template:
    metadata:
      labels:
        app: nrpilot-api
    spec:
      containers:
      - name: nrpilot-api
        image: nrp-nautilus/nrpilot-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: ENV
          value: production
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 20
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
