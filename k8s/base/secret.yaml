# Kubernetes Secret holding sensitive runtime values.
#
# The manifest is committed WITHOUT real values so secrets never enter git.
# Create the real secret in-cluster out-of-band before deploying, e.g.:
#
#   kubectl --kubeconfig ./kubeconfig-kind.yaml create secret generic \
#     nrpilot-api-secrets \
#     --from-literal=NRP_LLM_TOKEN=<your-llm-token> \
#     --from-literal=KUBERNETES_API_KEY=<your-k8s-bearer-token>
#
# Expected keys:
#   NRP_LLM_TOKEN      LLM gateway bearer token
#   KUBERNETES_API_KEY Kubernetes API bearer token
apiVersion: v1
kind: Secret
metadata:
  name: nrpilot-api-secrets
type: Opaque
stringData:
  NRP_LLM_TOKEN: ""
  KUBERNETES_API_KEY: ""
